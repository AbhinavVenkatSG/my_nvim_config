# Yazi configuration for Windows + WezTerm

[manager]
ratio = [1, 4, 3]
show_hidden = false
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
scrolloff = 3

[preview]
tab_size = 2
max_width = 600
max_height = 900
image_filter = "triangle"
image_quality = 90

[opener]
edit = [
  { run = 'nvim.exe "$@"', block = true, for = "windows" },
]
open = [
  { run = 'start "" "$1"', orphan = true, for = "windows" },
]

[log]
level = "error"
